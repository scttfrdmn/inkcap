name: Feature request
description: Suggest a capability or enhancement
labels: ["type: feature"]
body:
  - type: markdown
    attributes:
      value: |
        Please check the scope note in
        [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md#scope) first — inkcap is
        intentionally not a browser or a LaTeX replacement.
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that inkcap doesn't let you do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should inkcap do? A new flag, config key, or behaviour?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried or other approaches you weighed.
    validations:
      required: false

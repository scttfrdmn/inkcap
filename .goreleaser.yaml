# GoReleaser configuration for inkcap.
# Docs: https://goreleaser.com
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: inkcap
    main: ./cmd/inkcap
    binary: inkcap
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows on arm64 isn't a target we care to ship.
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: inkcap
    formats: [tar.gz]
    # Use zip for Windows.
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE

nfpms:
  - id: inkcap
    package_name: inkcap
    vendor: Scott Friedman
    homepage: https://github.com/scttfrdmn/inkcap
    maintainer: Scott Friedman <3011922+scttfrdmn@users.noreply.github.com>
    description: Markdown to typeset PDF in one static binary.
    license: Apache-2.0
    formats:
      - deb
      - rpm
    bindir: /usr/bin

# Classic per-arch docker builds + a manifest. dockers_v2 was tried but its
# multi-platform build context did not stage the binary for the COPY, so the
# image build failed; this proven form builds each arch from its own GOOS/GOARCH
# artifact and then stitches a multi-arch manifest.
dockers:
  - id: inkcap-amd64
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/scttfrdmn/inkcap:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/scttfrdmn/inkcap"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
  - id: inkcap-arm64
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/scttfrdmn/inkcap:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/scttfrdmn/inkcap"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

docker_manifests:
  - name_template: "ghcr.io/scttfrdmn/inkcap:{{ .Version }}"
    image_templates:
      - "ghcr.io/scttfrdmn/inkcap:{{ .Version }}-amd64"
      - "ghcr.io/scttfrdmn/inkcap:{{ .Version }}-arm64"
  - name_template: "ghcr.io/scttfrdmn/inkcap:latest"
    skip_push: auto # prereleases don't move :latest
    image_templates:
      - "ghcr.io/scttfrdmn/inkcap:{{ .Version }}-amd64"
      - "ghcr.io/scttfrdmn/inkcap:{{ .Version }}-arm64"

homebrew_casks:
  - name: inkcap
    repository:
      owner: scttfrdmn
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/scttfrdmn/inkcap
    description: Markdown to typeset PDF in one static binary.
    license: Apache-2.0
    directory: Casks
    # The downloaded binary is unsigned; clear the quarantine flag so macOS
    # doesn't block it on first run.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/inkcap"]
          end

scoops:
  - name: inkcap
    repository:
      owner: scttfrdmn
      name: scoop-bucket
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/scttfrdmn/inkcap
    description: Markdown to typeset PDF in one static binary.
    license: Apache-2.0

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "merge conflict"
      - Merge pull request
      - Merge branch

release:
  draft: false
  prerelease: auto

# GoReleaser configuration for inkcap.
# Docs: https://goreleaser.com
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: inkcap
    main: ./cmd/inkcap
    binary: inkcap
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows on arm64 isn't a target we care to ship.
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: inkcap
    formats: [tar.gz]
    # Use zip for Windows.
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "merge conflict"
      - Merge pull request
      - Merge branch

release:
  draft: false
  prerelease: auto
